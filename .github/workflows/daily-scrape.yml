name: Daily scrape

on:
  # 06:00 UTC = 03:00 AR (UTC-3) — off-peak for most stores
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Scrape Tiendanube (14 stores)
        run: node scripts/scrape-tiendanube.mjs full
        continue-on-error: true

      - name: Scrape WooCommerce (8 stores)
        run: node scripts/scrape-woocommerce.mjs
        continue-on-error: true

      - name: Scrape VTEX (6 supermarkets)
        run: node scripts/scrape-vtex.mjs
        continue-on-error: true

      - name: Scrape Shopify (1 store)
        run: node scripts/scrape-shopify.mjs
        continue-on-error: true

      - name: Scrape Mercado Libre (listing pages)
        run: node scripts/scrape-mercadolibre.mjs
        continue-on-error: true

      - name: Enrich ML catalog (brand, varietal, EAN)
        env:
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
        run: node scripts/enrich-ml-catalog.mjs
        continue-on-error: true

      - name: Scrape Magento (Ligier)
        run: node scripts/scrape-magento.mjs
        continue-on-error: true

      - name: Scrape PrestaShop (Frappe)
        run: node scripts/scrape-prestashop.mjs
        continue-on-error: true

      - name: Merge snapshots
        run: node scripts/merge-snapshots.mjs

      - name: Build groups (Stage 1 matching)
        run: node scripts/build-groups.mjs

      - name: Restore embeddings cache
        id: embeddings-cache
        uses: actions/cache@v4
        with:
          path: data/embeddings-cache.json
          key: embeddings-cache-v1-${{ github.run_id }}
          restore-keys: |
            embeddings-cache-v1-

      - name: Stage 2 embeddings (if OPENAI_API_KEY set)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            node scripts/stage2-embeddings.mjs
          else
            echo "Skipping Stage 2 — OPENAI_API_KEY not set in repo secrets"
          fi
        continue-on-error: true

      - name: Stats
        run: |
          node -e "
            const s = JSON.parse(require('fs').readFileSync('data/snapshot.json', 'utf8'));
            console.log('Stores:', s.storeCount);
            console.log('Products:', s.productCount);
            console.log('Groups:', s.groupCount);
            console.log('Multi-store groups:', s.multiStoreGroupCount);
          "

      - name: Check for changes
        id: diff
        run: |
          git add data/snapshot.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit + push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh snapshot (daily scrape)

          Auto-generated by .github/workflows/daily-scrape.yml.

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          # Si main cambió mientras corríamos (PRs mergeados), rebase y
          # reintentar push. Sin esto, el run fallaba con "non-fast-forward".
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "rebase failed"; exit 1; }
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying"
            sleep 5
          done
          echo "all push attempts failed"
          exit 1
