name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      # Only run Lighthouse when frontend-ish files change — snapshot
      # refreshes and script-only PRs don't need a perf check.
      - "app/**"
      - "components/**"
      - "lib/**"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".lighthouserc.json"
      - ".github/workflows/lighthouse.yml"

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm run start -- -p 3000 &
          # Wait for server to respond
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200"; then
              echo "Server up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/buscar?q=malbec
            http://localhost:3000/bodega/zuccardi
            http://localhost:3000/varietal/malbec
            http://localhost:3000/sobre
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
